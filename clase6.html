      <h1>Formularios</h1>
      <form action="">
        <h2>Registro</h2>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="¿Cómo te llamás?">
        <span>Mensaje de estado</span>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" placeholder="¿Cuál es tu apellido?">
        <span>Mensaje de estado</span>
        
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="email@dominio.com" required>
        <span>Mensaje de estado</span>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{10,}$" title="La contraseña debe tener al menos 10 caracteres, 1 mayúscula, 1 número y 1 símbolo (!@#$%^&*)" required>
        <span>Mensaje de estado</span>

        <button>Registrame</button>
      </form>
